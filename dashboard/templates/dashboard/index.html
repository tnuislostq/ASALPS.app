<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASALPS - Skill Audit Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'course_list' %}">ASALPS</a>
        <div class="navbar-nav">
            <a class="nav-link" href="{% url 'course_list' %}">Courses</a>
            <a class="nav-link active" href="{% url 'dashboard_index' %}">Dashboard</a>
        </div>
    </div>
</nav>
    <div class="container">
        <h1 class="mb-4">Learning Analytics & Skill Audit</h1>
        
        <!-- Progress Bar -->
        <div class="card mb-4 p-3 shadow-sm">
            <h5 class="card-title">Overall Completion Progress</h5>
            <div class="progress mt-2" style="height: 25px;">
                <div class="progress-bar bg-success fs-6" role="progressbar" style="--pg: {{ progress }}%; width: var(--pg);" aria-valuenow="{{ progress }}" aria-valuemin="0" aria-valuemax="100"></div>
                    {{ progress }}%
                </div>
            </div>
        </div>

        <!-- Stat Cards -->
        <div class="row">
            <div class="col-md-4 mb-3">
                <div class="card text-center shadow-sm p-3 border-primary">
                    <h3 class="text-primary">{{ total_courses }}</h3>
                    <p class="text-muted mb-0">Enrolled Courses</p>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card text-center shadow-sm p-3 border-warning">
                    <h3 class="text-warning">{{ total_tasks }}</h3>
                    <p class="text-muted mb-0">Total Tasks</p>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card text-center shadow-sm p-3 border-success">
                    <h3 class="text-success">{{ completed_tasks }}</h3>
                    <p class="text-muted mb-0">Completed Tasks</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
